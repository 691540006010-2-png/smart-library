<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบห้องสมุดออนไลน์</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --light-bg: #f8f9fa;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; background-color: var(--light-bg); color: #333; }
        
        /* Navigation */
        nav { background-color: var(--primary-color); padding: 1rem; display: flex; justify-content: space-between; align-items: center; color: white; }
        nav .logo { font-size: 1.5rem; font-weight: bold; }
        nav ul { list-style: none; display: flex; margin: 0; padding: 0; }
        nav ul li { margin-left: 20px; }
        nav ul li a { color: white; text-decoration: none; cursor: pointer; font-weight: 500; }
        nav ul li a:hover { color: var(--secondary-color); }

        /* Container & Pages */
        .container { max-width: 1000px; margin: 30px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .page { display: none; }
        .page.active { display: block; }

        /* Forms & Buttons */
        h2 { border-bottom: 2px solid var(--secondary-color); padding-bottom: 10px; color: var(--primary-color); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: var(--secondary-color); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { opacity: 0.9; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: var(--primary-color); color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
        .badge.available { background-color: #d4edda; color: #155724; }
        .badge.borrowed { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">📚 Smart Library</div>
        <ul id="nav-links">
            <li><a onclick="switchPage('login-page')">ล็อคอิน</a></li>
            <li><a onclick="switchPage('list-page')">รายการหนังสือ</a></li>
            <li><a onclick="switchPage('borrow-page')">ยืม-คืนหนังสือ</a></li>
            <li><a onclick="switchPage('add-page')">เพิ่มหนังสือ</a></li>
        </ul>
    </nav>

    <div class="container">
        
        <div id="login-page" class="page active">
            <h2>🔐 เข้าสู่ระบบ</h2>
            <form onsubmit="event.preventDefault(); handleLogin();">
                <div class="form-group">
                    <label>ชื่อผู้ใช้งาน (Username)</label>
                    <input type="text" id="username" placeholder="ใส่ชื่ออะไรก็ได้เพื่อทดสอบ" required>
                </div>
                <div class="form-group">
                    <label>รหัสผ่าน (Password)</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit">เข้าสู่ระบบ</button>
            </form>
            <p id="login-status" style="margin-top:15px; color: var(--success-color); font-weight:bold;"></p>
        </div>

        <div id="list-page" class="page">
            <h2>📖 รายการหนังสือทั้งหมดในระบบ</h2>
            <table>
                <thead>
                    <tr>
                        <th>รหัสหนังสือ</th>
                        <th>ชื่อหนังสือ</th>
                        <th>ผู้แต่ง</th>
                        <th>สถานะ</th>
                    </tr>
                </thead>
                <tbody id="book-table-body">
                    </tbody>
            </table>
        </div>

        <div id="borrow-page" class="page">
            <h2>🔄 ระบบยืม-คืนหนังสือ</h2>
            <div class="form-group">
                <label>เลือกหนังสือที่ต้องการทำรายการ</label>
                <select id="borrow-book-select">
                    </select>
            </div>
            <button onclick="processAction('borrow')" style="background-color: var(--success-color);">ยืมหนังสือ</button>
            <button onclick="processAction('return')" style="background-color: var(--danger-color);">คืนหนังสือ</button>
        </div>

        <div id="add-page" class="page">
            <h2>➕ เพิ่มหนังสือใหม่เข้าระบบ</h2>
            <form onsubmit="event.preventDefault(); addNewBook();">
                <div class="form-group">
                    <label>ชื่อหนังสือ</label>
                    <input type="text" id="new-title" placeholder="เช่น ตัวอย่างการเขียนโปรแกรม" required>
                </div>
                <div class="form-group">
                    <label>ชื่อผู้แต่ง</label>
                    <input type="text" id="new-author" placeholder="เช่น สมชาย ใจดี" required>
                </div>
                <button type="submit">บันทึกหนังสือ</button>
            </form>
        </div>

    </div>

    <script>
        // ข้อมูลหนังสือเริ่มต้น 5 เล่มตามโจทย์
        let books = [
            { id: "B001", title: "คู่มือการใช้งาน HTML5 และ CSS3", author: "วันเฉลิม มั่นคง", status: "พร้อมใช้งาน" },
            { id: "B002", title: "เริ่มต้นเรียนรู้ JavaScript ฉบับรวบรัด", author: "มยุรี ดีใจ", status: "ถูกยืมแล้ว" },
            { id: "B003", title: "พัฒนาเว็บแอปพลิเคชันด้วย Node.js", author: "สมศักดิ์ รักเรียน", status: "พร้อมใช้งาน" },
            { id: "B004", title: "UI/UX Design สำหรับผู้เริ่มต้น", author: "กิตติพงษ์ นามสมมุติ", status: "พร้อมใช้งาน" },
            { id: "B005", title: "โครงสร้างข้อมูลและอัลกอริทึม", author: "ดร.วิชาการ เก่งกาจ", status: "ถูกยืมแล้ว" }
        ];

        // ฟังก์ชันสลับหน้าจอ
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            // อัปเดตข้อมูลในหน้าต่างๆ เสมอเมื่อสลับหน้า
            renderBookList();
            populateSelectOptions();
        }

        // ฟังก์ชันแสดงรายการหนังสือในตาราง (หน้ารายการ)
        function renderBookList() {
            const tbody = document.getElementById('book-table-body');
            tbody.innerHTML = '';
            
            books.forEach(book => {
                const badgeClass = book.status === "พร้อมใช้งาน" ? "available" : "borrowed";
                const row = `<tr>
                    <td>${book.id}</td>
                    <td><b>${book.title}</b></td>
                    <td>${book.author}</td>
                    <td><span class="badge ${badgeClass}">${book.status}</span></td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        // ฟังก์ชันอัปเดตตัวเลือกหนังสือในหน้ายืม-คืน
        function populateSelectOptions() {
            const select = document.getElementById('borrow-book-select');
            select.innerHTML = '';
            
            books.forEach(book => {
                const option = document.createElement('option');
                option.value = book.id;
                option.textContent = `${book.id} - ${book.title} (${book.status})`;
                select.appendChild(option);
            });
        }

        // ฟังก์ชันจำลองการล็อกอิน
        function handleLogin() {
            const username = document.getElementById('username').value;
            document.getElementById('login-status').innerText = `สวัสดีคุณ ${username}! ยินดีต้อนรับสู่ระบบห้องสมุด`;
            alert(`ยินดีต้อนรับคุณ ${username}!`);
            switchPage('list-page'); // ล็อกอินเสร็จให้เด้งไปหน้ารายการหนังสือ
        }

        // ฟังก์ชันจัดการการยืมหรือคืน
        function processAction(action) {
            const bookId = document.getElementById('borrow-book-select').value;
            const book = books.find(b => b.id === bookId);

            if (!book) return;

            if (action === 'borrow') {
                if (book.status === "ถูกยืมแล้ว") {
                    alert("ขออภัยครับ หนังสือเล่มนี้ถูกยืมไปแล้ว!");
                } else {
                    book.status = "ถูกยืมแล้ว";
                    alert(`ทำรายการยืมหนังสือ "${book.title}" สำเร็จ!`);
                }
            } else if (action === 'return') {
                if (book.status === "พร้อมใช้งาน") {
                    alert("หนังสือเล่มนี้อยู่ในห้องสมุดอยู่แล้ว ไม่ต้องคืนครับ!");
                } else {
                    book.status = "พร้อมใช้งาน";
                    alert(`ทำรายการคืนหนังสือ "${book.title}" สำเร็จ!`);
                }
            }
            populateSelectOptions();
        }

        // ฟังก์ชันเพิ่มหนังสือใหม่
        function addNewBook() {
            const title = document.getElementById('new-title').value;
            const author = document.getElementById('new-author').value;
            
            // รันรหัสหนังสือถัดไปอัตโนมัติ เช่น B006, B007
            const nextId = "B" + String(books.length + 1).padStart(3, '0');

            const newBook = {
                id: nextId,
                title: title,
                author: author,
                status: "พร้อมใช้งาน"
            };

            books.push(newBook);
            alert(`เพิ่มหนังสือ "${title}" เข้าระบบสำเร็จแล้ว!`);
            
            // รีเซ็ตฟอร์มและกลับไปหน้ารายการ
            document.getElementById('new-title').value = '';
            document.getElementById('new-author').value = '';
            switchPage('list-page');
        }

        // เรียกใช้งานครั้งแรกเมื่อเปิดเว็บ
        renderBookList();
        populateSelectOptions();
    </script>
</body>
</html>
